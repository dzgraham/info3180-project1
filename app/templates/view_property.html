{% extends 'base.html' %}

{% block main %}

<div class="row justify-content-center mt-5">
    <div class="col-lg-10">
        <div class="card property-card-horizontal shadow">
            <div class="row g-0">

                <div class="col-md-5 property-img-container">
                    <img src="{{ url_for('get_image', filename=property.photo_filename) }}"
                         alt="{{ property.title }}">
                </div>

                <div class="col-md-7">
                    <div class="card-body p-4 d-flex flex-column h-100">
                        <h2 class="card-title mb-3">{{ property.title }}</h2>

                        <p class="card-text">{{ property.description }}</p>

                        <p class="card-text">
                            <button class="btn btn-success w-auto mt-3 rounded-pill py-1 px-4 ">
                                ${{ "{:,.2f}".format(property.price) if property.price else "0.00" }}
                            </button>

                            <button class="btn btn-success w-max mt-3 rounded-pill py-1">
                                {{ property.property_type }}
                            </button>

                        </p>

                        <div class="row property-meta mt-3">
                            <div class="col-sm-6">
                                <ul class="list-unstyled">
                                    <li><i class="fa-solid fa-bed"></i> {{ property.bedrooms }} Bedrooms</li>
                                    <li><i class="fa-solid fa-bath"></i> {{ property.bathrooms }} Bathrooms</li>
                                </ul>
                            </div>
                            <div class="col-sm-6">
                                <ul class="list-unstyled">
                                    <li>
                                        <i class="fa-solid fa-location-dot"></i>
                                        {{ property.location }}
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <div class="mt-auto pt-4">
                            <a href="#" class="btn btn-primary rounded-pill px-4">Email Realtor</a>
                            <a href="{{ url_for('properties') }}" class="btn btn-outline-secondary rounded-pill px-4 ms-2">Back</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
